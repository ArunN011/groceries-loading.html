<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Stackly Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
overflow-x:hidden;
font-family: Arial, Helvetica, sans-serif;
}

*{
box-sizing:border-box;
}

.login-card{
    background:white;
    padding:30px;
    border-radius:12px;
    width:100%;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#2c5364;
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.form-select,
.form-control{
    width:100%;
}

select{
    max-width:100%;
}
select.form-select{
width:100%;
max-width:100%;
}

.input-group-text{
    background:white;
    cursor:pointer;
}

.login-btn{
    background:#2c5364;
    color:white;
    border:none;
    border-radius:8px;
    padding:10px;
    font-weight:600;
}

.login-btn:hover{
    background:#1f3e4b;
}

.extra-links{
    font-size:14px;
    margin-top:10px;
}

.signup-link{
    text-align:center;
    margin-top:15px;
}

.back-home{
    position:absolute;
    top:20px;
    left:20px;
}

@media (max-width:576px){

.login-card{
max-width:550px;
width: 100%;
padding:20px;
}
.form-select{
font-size: 12px;
padding:8px;
}

.input-group-text{
    padding:6px 10px;
}

.form-control{
    font-size:14px;
}

}

</style>

</head>

<body>

<a href="index.html" class="btn btn-light back-home">
<i class="bi bi-arrow-left"></i> Back
</a>

<div class="login-card">

<div class="logo">
<i class="bi bi-capsule-pill"></i> Stackly
</div>

<div class="subtitle">
Login to your account
</div>

<form onsubmit="loginUser(event)">

<div class="mb-3">
  <label class="form-label">Login As</label>
  <select class="form-select w-100" id="role" required>
    <option value="" disabled selected>Select Role</option>
    <option value="researcher">Researcher</option>
    <option value="patient">Patient</option>
  </select>
</div>

<div class="mb-3">

<label class="form-label">Email</label>

<div class="input-group w-100">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter email"
required
>

</div>

</div>

<div class="mb-3">

<label class="form-label" >Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter password"
required
>

<span class="input-group-text" onclick="togglePassword()">
<i class="bi bi-eye" id="eyeIcon"></i>
</span>

</div>

</div>

<div class="form-check">

<input class="form-check-input" type="checkbox" required>

<label class="form-check-label">
Remember me
</label>

</div>

<div class="extra-links">
<a href="error.html">Forgot Password?</a>
</div>

<button class="btn login-btn w-100 mt-3">
<i class="bi bi-box-arrow-in-right"></i> Login
</button>

</form>

<div class="signup-link">
Don't have an account?
<a href="register.html">Sign Up</a>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function togglePassword(){

let pass = document.getElementById("password");
let eye = document.getElementById("eyeIcon");

if(pass.type === "password"){
pass.type = "text";
eye.classList.replace("bi-eye","bi-eye-slash");
}
else{
pass.type = "password";
eye.classList.replace("bi-eye-slash","bi-eye");
}

}

function loginUser(event){

event.preventDefault();
let email = document.getElementById("email").value;

let role = document.getElementById("role").value;
localStorage.setItem("userEmail", email);
if(role === "patient"){
window.location.href = "patdashboard.html";
}
else if(role === "researcher"){
window.location.href = "resdashboard.html";
}
else{
alert("Please select a role");
}

}

</script>

</body>
</html>
